<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grille d'Auto-Évaluation Immobilière - AuditPro AI</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
    body, h1, h3, p { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Open Sans', sans-serif; background-color: #f7f9fc; color: #333; line-height: 1.6; padding: 40px 20px; }
    .container { max-width: 900px; margin: 0 auto; }
    header { background-color: #0c1c24; color: white; padding: 30px; border-radius: 12px 12px 0 0; text-align: center; margin-bottom: 40px; }
    .brand-logo { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 24px; letter-spacing: 1px; }
    .brand-title { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: 16px; opacity: 0.8; margin-top: 5px; }
    h1 { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 32px; color: #0c1c24; text-align: center; margin-bottom: 30px; }
    .audit-section { background-color: white; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
    .audit-section h3 { font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 20px; color: #0c1c24; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #00d632; }
    .audit-item { background-color: white; border: 1px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    .question-text { font-weight: 600; font-size: 16px; margin-bottom: 15px; color: #0c1c24; }
    .options-group { display: flex; gap: 15px; justify-content: flex-end; }
    .option-button { display: flex; align-items: center; gap: 8px; background-color: white; border: 1px solid #dcdcdc; color: #555; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .option-button input { display: none; }
    .option-button.oui input:checked + .option-label { color: #00d632; border-bottom: 2px solid #00d632; }
    .option-button.non input:checked + .option-label { color: #e74c3c; border-bottom: 2px solid #e74c3c; }
    .option-button.inconnu input:checked + .option-label { color: #bdc3c7; border-bottom: 2px solid #bdc3c7; }
    .submit-btn { display: block; width: 100%; padding: 15px; background: #00d632; color: white; text-align: center; border-radius: 8px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand-logo">AUDITPRO</div>
            <div class="brand-title">L'expertise immobilière propulsée par l'IA</div>
        </header>

        <h1>Grille d'Auto-Évaluation Immobilière</h1>

        <form id="auditForm">
            <section class="audit-section">
                <h3>1. DPE (Performance Énergétique & Thermique)</h3>
                <div class="audit-item">
                    <p class="question-text">Murs extérieurs isolés (tapement des fenêtres > 10 cm) ?</p>
                    <div class="options-group">
                        <label class="option-button oui"><input type="radio" name="isolation_murs" value="oui" required><span class="option-label">✔ Oui</span></label>
                        <label class="option-button non"><input type="radio" name="isolation_murs" value="non"><span class="option-label">✘ Non</span></label>
                        <label class="option-button inconnu"><input type="radio" name="isolation_murs" value="inconnu"><span class="option-label">❓ Inconnu</span></label>
                    </div>
                </div>
                <div class="audit-item">
                    <p class="question-text">Combles isolés avec au moins 30 cm d'épaisseur ?</p>
                    <div class="options-group">
                        <label class="option-button oui"><input type="radio" name="isolation_combles" value="oui" required><span class="option-label">✔ Oui</span></label>
                        <label class="option-button non"><input type="radio" name="isolation_combles" value="non"><span class="option-label">✘ Non</span></label>
                        <label class="option-button inconnu"><input type="radio" name="isolation_combles" value="inconnu"><span class="option-label">❓ Inconnu</span></label>
                    </div>
                </div>
                <div class="audit-item">
                    <p class="question-text">Plancher bas isolé par le dessous ?</p>
                    <div class="options-group">
                        <label class="option-button oui"><input type="radio" name="isolation_plancher" value="oui" required><span class="option-label">✔ Oui</span></label>
                        <label class="option-button non"><input type="radio" name="isolation_plancher" value="non"><span class="option-label">✘ Non</span></label>
                        <label class="option-button inconnu"><input type="radio" name="isolation_plancher" value="inconnu"><span class="option-label">❓ Inconnu</span></label>
                    </div>
                </div>
            </section>

            <button type="submit" class="submit-btn">Générer mon pré-audit</button>
        </form>
    </div>

    <script>
        document.getElementById('auditForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            
            console.log("Données prêtes pour Python (JSON) :", JSON.stringify(data));
            alert("Données collectées avec succès ! Regarde la console (F12).");
        });
    </script>
</body>
</html>
